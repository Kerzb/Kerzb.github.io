<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Space</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafaf8; }
  #lock-screen {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  .lock-card {
    background: #fff; border: 1px solid #e8e5e0; border-radius: 12px;
    padding: 40px; max-width: 380px; width: 100%; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .lock-card h2 { font-size: 1.2em; font-weight: 600; color: #37352f; margin-bottom: 8px; }
  .lock-card p { font-size: 0.85em; color: #787774; margin-bottom: 24px; }
  .lock-card input {
    width: 100%; border: 1px solid #e8e5e0; border-radius: 8px;
    padding: 12px 16px; font-size: 1em; outline: none; text-align: center;
    letter-spacing: 2px; margin-bottom: 16px;
  }
  .lock-card input:focus { border-color: #2f80ed; }
  .lock-card button {
    width: 100%; background: #37352f; color: #fff; border: none;
    border-radius: 8px; padding: 12px; font-size: 0.95em; cursor: pointer;
    transition: opacity 0.2s;
  }
  .lock-card button:hover { opacity: 0.85; }
  .error-msg { color: #d44c47; font-size: 0.85em; margin-top: 12px; display: none; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">&#128274;</div>
    <h2>Private Space</h2>
    <p>Enter the password to continue.</p>
    <input type="password" id="pwd-input" placeholder="Password" autofocus
           onkeydown="if(event.key==='Enter')decrypt()">
    <button onclick="decrypt()">Unlock</button>
    <div class="error-msg" id="error-msg">Incorrect password, please try again.</div>
  </div>
</div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decrypt() {
  const pwd = document.getElementById("pwd-input").value;
  const errEl = document.getElementById("error-msg");
  errEl.style.display = "none";

  try {
    const salt = b64ToBytes(ENCRYPTED.salt);
    const nonce = b64ToBytes(ENCRYPTED.nonce);
    const ciphertext = b64ToBytes(ENCRYPTED.ciphertext);
    const key = await deriveKey(pwd, salt);

    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: nonce },
      key,
      ciphertext
    );

    const html = new TextDecoder().decode(decrypted);

    // Store password for sub-pages (weight tracker etc.)
    sessionStorage.setItem("_wt_pwd", pwd);

    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = "block";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}
