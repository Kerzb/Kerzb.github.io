function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function autoDecrypt() {
  const pwd = sessionStorage.getItem("_wt_pwd");
  if (!pwd) {
    // No password in session, redirect to portal to unlock
    window.location.href = "../";
    return;
  }

  try {
    const salt = b64ToBytes(ENCRYPTED.salt);
    const nonce = b64ToBytes(ENCRYPTED.nonce);
    const ciphertext = b64ToBytes(ENCRYPTED.ciphertext);
    const key = await deriveKey(pwd, salt);

    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: nonce },
      key,
      ciphertext
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    // Password wrong or corrupted, re-authenticate
    sessionStorage.removeItem("_wt_pwd");
    window.location.href = "../";
  }
}

autoDecrypt();
